kind = "web"
previewPath = "/"
title = "AI Product Recommender"
version = "1.0.0"
id = "artifacts/product-recommender"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21301

[services.development]
run = "pnpm --filter @workspace/product-recommender run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/product-recommender", "run", "build" ]
publicDir = "artifacts/product-recommender/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21301"
BASE_PATH = "/"
